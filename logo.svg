<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF"/>
      <stop offset="100%" style="stop-color:#00D4AA"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#gradient)"/>
  
  <!-- Stylized "A" made of two connecting arcs (anastomosis concept) -->
  <g fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left arc -->
    <path d="M 55 140 Q 55 60 100 50"/>
    <!-- Right arc -->
    <path d="M 145 140 Q 145 60 100 50"/>
    <!-- Cross connection (the anastomosis) -->
    <path d="M 70 105 L 130 105"/>
  </g>
</svg>
