name: Submit Waitlist Entry

on:
  repository_dispatch:
    types: [waitlist_submit]

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Add entry
        run: |
          # Read existing entries
          if [ -f waitlist/entries.json ]; then
            entries=$(cat waitlist/entries.json)
          else
            entries="[]"
          fi
          
          # Add new entry
          new_entry='${{ toJson(github.event.client_payload) }}'
          updated=$(echo "$entries" | jq --argjson entry "$new_entry" '. += [$entry]')
          
          echo "$updated" > waitlist/entries.json
          
      - name: Commit
        run: |
          git config user.name "Anasto Bot"
          git config user.email "bot@anasto.io"
          git add waitlist/entries.json
          git commit -m "waitlist: Add ${{ github.event.client_payload.name }}"
          git push
