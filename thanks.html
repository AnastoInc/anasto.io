<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Anasto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0066FF 0%, #00D4AA 100%);
            padding: 2rem;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .checkmark {
            width: 80px;
            height: 80px;
            background: #D1FAE5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
        }
        h1 {
            font-family: 'Sora', sans-serif;
            font-size: 1.75rem;
            color: #0F172A;
            margin-bottom: 1rem;
        }
        p {
            color: #6B7280;
            margin-bottom: 2rem;
            line-height: 1.7;
        }
        a {
            display: inline-block;
            background: #0066FF;
            color: white;
            padding: 0.875rem 2rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }
        a:hover {
            background: #0052CC;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark">✓</div>
        <h1>You're on the list!</h1>
        <p>Thank you for joining the Anasto waitlist. We'll be in touch soon with early access details as we launch our pilot program.</p>
        <a href="index.html">Back to Anasto</a>
    </div>
</body>
</html>
